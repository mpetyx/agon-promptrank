{% extends 'leaderboard/base.html' %}

{% block content %}
<div class="px-4 sm:px-0 mt-8">
    <h2 class="text-3xl font-bold leading-7 text-white sm:truncate sm:tracking-tight mb-8">Command Center</h2>
    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <!-- Placeholder for actual admin dashboard widgets -->
        <div class="overflow-hidden rounded-lg bg-gray-800 px-4 py-5 shadow sm:p-6 ring-1 ring-gray-700 border-t-4 border-indigo-500">
            <dt class="truncate text-sm font-medium text-gray-400">Total API Webhooks</dt>
            <dd class="mt-1 text-3xl font-semibold tracking-tight text-white hx-get="/api/stats/webhooks" hx-trigger="every 5s">Loading...</dd>
        </div>
        <div class="overflow-hidden rounded-lg bg-gray-800 px-4 py-5 shadow sm:p-6 ring-1 ring-gray-700 border-t-4 border-purple-500">
            <dt class="truncate text-sm font-medium text-gray-400">Active Copilots</dt>
            <dd class="mt-1 text-3xl font-semibold tracking-tight text-white hx-get="/api/stats/copilots" hx-trigger="every 5s">Loading...</dd>
        </div>
        <div class="overflow-hidden rounded-lg bg-gray-800 px-4 py-5 shadow sm:p-6 ring-1 ring-gray-700 border-t-4 border-pink-500">
            <dt class="truncate text-sm font-medium text-gray-400">Anti-Cheat Flags</dt>
            <dd class="mt-1 text-3xl font-semibold tracking-tight text-red-500 hx-get="/api/stats/flags" hx-trigger="every 5s">Loading...</dd>
        </div>
    </div>
    <div class="mt-8 text-center bg-gray-800 rounded-lg p-12 border border-dashed border-gray-600">
        <p class="text-gray-400">To implement real-time command center: Configure Celery workers, bind Redis, and populate these endpoints.</p>
    </div>
</div>
{% endblock %}
