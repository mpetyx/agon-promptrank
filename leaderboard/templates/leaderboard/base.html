<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agon PromptRank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        h1, .font-heading { font-family: 'Outfit', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .feed-enter {
            animation: feedSlide 0.45s ease-out;
        }
        @keyframes feedSlide {
            from { transform: translateY(-6px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col relative overflow-x-hidden">
    <!-- Ambient Background Lighting -->
    <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-purple-900/20 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-blue-900/20 blur-[120px] pointer-events-none z-0"></div>

    <nav class="glass-panel sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center space-x-8">
                    <a href="/" class="flex flex-col">
                        <span class="font-heading font-black text-3xl tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-400">AGON</span>
                        <span class="text-xs font-semibold tracking-widest text-indigo-400 uppercase -mt-1">PromptRank</span>
                    </a>
                    <div class="hidden md:flex space-x-2">
                        <a href="/" class="text-gray-300 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300">The Arena</a>
                        <a href="{% url 'hall_of_fame' %}" class="text-gray-300 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300">Hall of Fame</a>
                        {% if request.user.is_staff %}
                        <a href="{% url 'command_center' %}" class="text-gray-300 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300">Command Center</a>
                        <a href="{% url 'analytics:roi_dashboard' %}" class="text-gray-300 hover:text-white hover:bg-white/5 px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300">ROI</a>
                        {% endif %}
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    {% if request.user.is_authenticated %}
                        <a href="/u/{{ request.user.username }}/" class="group relative inline-flex items-center justify-center bg-gradient-to-r from-purple-500 to-indigo-600 rounded-xl px-5 py-2.5 text-sm font-semibold text-white shadow-xl shadow-purple-900/30 hover:scale-105 transition-all duration-300 overflow-hidden">
                            <span class="relative z-10 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                My Profile
                            </span>
                            <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
                        </a>
                    {% else %}
                        <div class="text-sm text-gray-400 italic">Login to view profile</div>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow z-10 max-w-7xl w-full mx-auto py-12 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
