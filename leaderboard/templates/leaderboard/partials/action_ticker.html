{% if items %}
    {% for item in items %}
    <div class="feed-enter flex items-start gap-3 rounded-xl bg-white/5 border border-white/5 px-3 py-2 text-sm hover:bg-white/10 transition-colors">
        <div class="shrink-0 text-lg leading-none mt-0.5">{{ item.icon|default:"⚡" }}</div>
        <div class="min-w-0 flex-1">
            <p class="text-white/90 truncate">{{ item.message }}</p>
            <p class="text-[10px] uppercase tracking-widest text-gray-500 mt-0.5">
                {{ item.get_event_type_display }} · {{ item.created_at|timesince }} ago
            </p>
        </div>
    </div>
    {% endfor %}
{% else %}
    <div class="text-center text-gray-500 italic text-sm py-4">No activity yet — fire a webhook to see the ticker spark up.</div>
{% endif %}
